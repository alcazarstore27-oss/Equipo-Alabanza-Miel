<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Equipo Alabanza Miel</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3FB4E5" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <img
      src="icons/logo.png"
      alt="Equipo Alabanza Miel"
      class="logo"
    />
    <h1>Equipo Alabanza Miel</h1>
  </header>

  <!-- ===== ACCIONES ===== -->
  <section class="actions">
    <input id="searchInput" placeholder="🔍 Buscar canción" />

    <button id="newSongBtn">➕ Nueva Canción</button>
    <button id="newServiceBtn">📅 Nuevo Servicio</button>

    <select id="serviceSelect">
      <option value="">— Ver todas las canciones —</option>
    </select>

    <button id="altarBtn">🎹 En Vivo</button>
  </section>

  <!-- ===== LISTA DE CANCIONES ===== -->
  <main id="songList"></main>

  <!-- ===== EDITOR ===== -->
  <section id="editor" class="editor hidden">
    <h2 id="editorTitle"></h2>

    <label><strong>Tipo de canción</strong></label>
    <select id="songType">
      <option value="">— Seleccionar —</option>
      <option value="alabanza">🎶 Alabanza</option>
      <option value="adoracion">🙏 Adoración</option>
    </select>

    <textarea
      id="editorText"
      placeholder="Estructura, acordes y notas..."
    ></textarea>

    <button id="saveBtn">💾 Guardar</button>
    <button id="backBtn">⬅ Volver</button>
  </section>

  <!-- ===== MODO EN VIVO ===== -->
  <section id="liveView" class="live hidden">
    <pre id="liveContent"></pre>
    <button id="exitLive">❌ Salir</button>
  </section>

  <!-- ===== SERVICE WORKER ===== -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
