<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Equipo Alabanza Miel</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

  <meta name="theme-color" content="#3FB4E5">
</head>
<body>

  <!-- ENCABEZADO -->
  <div class="header">
    <img src="icons/logo.png" alt="Logo Equipo Alabanza Miel" class="logo">
    <h1>Equipo Alabanza Miel</h1>
  </div>

  <!-- BOTONES PRINCIPALES -->
  <button id="newNoteBtn">➕ Nueva Canción</button>
  <button id="newServiceBtn">📅 Nuevo Servicio</button>

  <!-- SELECTOR DE SERVICIOS -->
  <select id="serviceSelect">
    <option value="">— Ver todas las canciones —</option>
  </select>

  <!-- LISTA -->
  <div id="notesList"></div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
