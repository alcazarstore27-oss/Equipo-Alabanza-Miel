<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipo Alabanza Miel</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#3FB4E5">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <img src="icons/logo.png" class="logo" alt="Logo">
    <h1>Equipo Alabanza Miel</h1>
  </header>

  <!-- ACCIONES -->
  <section class="actions">
    <input type="text" id="searchInput" placeholder="🔍 Buscar canción">
    <button id="newSongBtn">➕ Nueva Canción</button>

    <button id="newServiceBtn">📅 Nuevo Servicio</button>
    <select id="serviceSelect">
      <option value="">— Ver todas las canciones —</option>
    </select>

    <button id="altarBtn">🎹 En Vivo</button>
  </section>

  <!-- LISTA -->
  <main id="songList"></main>

  <!-- EDITOR -->
  <section id="editor" class="editor hidden">
    <h2 id="editorTitle"></h2>
    <textarea id="editorText" placeholder="Estructura, acordes y notas..."></textarea>

    <div id="serviceCheckboxes"></div>

    <button id="saveBtn">💾 Guardar</button>
    <button id="backBtn">⬅ Volver</button>
  </section>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
