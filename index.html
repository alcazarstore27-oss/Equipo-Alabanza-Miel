<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Equipo Alabanza Miel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3FB4E5">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <img src="icons/logo.png" class="logo">
  <h1>Equipo Alabanza Miel</h1>
</header>

<section class="actions">
  <button id="newSongBtn">➕ Nueva Canción</button>
  <button id="newServiceBtn">📅 Nuevo Servicio</button>

  <select id="serviceSelect">
    <option value="">— Seleccionar servicio —</option>
  </select>

  <button id="serviceLiveBtn">🎼 Servicio en Vivo</button>
</section>

<main id="songList"></main>

<!-- ===== EDITOR ===== -->
<section id="editor" class="editor hidden">
  <h2 id="editorTitle"></h2>

  <label><strong>Tipo de canción</strong></label>
  <select id="songType">
    <option value="">— Tipo —</option>
    <option value="alabanza">🎶 Alabanza</option>
    <option value="adoracion">🙏 Adoración</option>
  </select>

  <label><strong>Asignar al servicio</strong></label>
  <select id="songService">
    <option value="">— Sin asignar —</option>
  </select>

  <textarea id="editorText" placeholder="Letra, acordes, estructura..."></textarea>

  <button id="saveBtn">💾 Guardar</button>
  <button id="backBtn">⬅ Volver</button>
</section>

<!-- ===== SERVICIO EN VIVO ===== -->
<section id="serviceLive" class="hidden">
  <h2>🎼 Orden del Servicio</h2>
  <div id="serviceSongList"></div>

  <button id="exitServiceBtn">❌ Terminar Servicio</button>
</section>

<!-- ===== MODO EN VIVO ===== -->
<section id="liveView" class="live hidden">
  <pre id="liveContent"></pre>
</section>

<script src="app.js"></script>
</body>
</html>
