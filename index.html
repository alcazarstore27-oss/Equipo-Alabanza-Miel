<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipo Alabanza Miel</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#3FB4E5">
</head>
<body>

<header class="header">
  <img src="icons/logo.png" class="logo">
  <h1>Equipo Alabanza Miel</h1>
</header>

<section class="actions">
  <button id="newSongBtn">➕ Nueva Canción</button>
  <button id="newServiceBtn">📅 Nuevo Servicio</button>

  <select id="serviceSelect">
    <option value="">— Selecciona servicio —</option>
  </select>

  <button id="deleteServiceBtn" class="danger hidden">🗑️ Borrar servicio</button>
  <button id="altarBtn">🎹 En Vivo</button>
</section>

<main id="songList"></main>

<!-- EDITOR -->
<section id="editor" class="editor hidden">
  <h2 id="editorTitle"></h2>

  <label><strong>Tipo de canción</strong></label>
  <select id="songType">
    <option value="">— Seleccionar —</option>
    <option value="alabanza">🎶 Alabanza</option>
    <option value="adoracion">🙏 Adoración</option>
  </select>

  <textarea
    id="editorText"
    placeholder="Estructura, acordes y notas..."
  ></textarea>

  <button id="saveBtn">💾 Guardar</button>
  <button id="backBtn">⬅ Volver</button>
</section>

<!-- VISOR EN VIVO -->
<section id="liveView" class="live hidden">
  <pre id="liveContent"></pre>
  <button id="exitLive">❌ Salir</button>
</section>

<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
